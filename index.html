<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Match — live search</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F1F2F4; --ink:#191C22; --surface:#FFFFFF;
    --accent:#3B5BDB; --accent-deep:#2942A8;
    --muted:#6C727C; --line:#E2E4E8;
    --display:"Bricolage Grotesque",sans-serif; --body:"Inter",sans-serif; --mono:"Space Mono",monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--paper);color:var(--ink);font-family:var(--body);
    -webkit-font-smoothing:antialiased;display:flex;justify-content:center;padding:clamp(10px,2.5vw,28px)}
  .app{width:100%;max-width:780px;height:calc(100vh - clamp(20px,5vw,56px));min-height:540px;
    background:var(--surface);border:1px solid var(--line);border-radius:20px;
    display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 50px -30px rgba(25,28,34,.5)}

  header.bar{padding:18px 20px 14px;border-bottom:1px solid var(--line);flex-shrink:0}
  .brand{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .dot{width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 4px rgba(59,91,219,.16)}
  .brand h1{font-family:var(--display);font-weight:700;font-size:19px;letter-spacing:-.01em}
  .brand .live{font-family:var(--mono);font-size:10px;color:var(--accent-deep);letter-spacing:.14em;margin-left:2px}

  .controls{display:flex;gap:8px;flex-wrap:wrap}
  .controls input,.controls select{border:1px solid var(--line);border-radius:10px;padding:11px 13px;
    font-family:var(--body);font-size:14px;background:var(--paper)}
  .controls input:focus,.controls select:focus{outline:2px solid var(--accent);outline-offset:0;background:var(--surface)}
  #q{flex:1 1 240px}
  #where{flex:1 1 150px}
  #dist{flex:0 0 auto}
  .go{background:var(--ink);color:#fff;border:none;border-radius:10px;padding:0 20px;
    font-family:var(--display);font-weight:600;font-size:14px;cursor:pointer;transition:.15s;flex:0 0 auto}
  .go:hover:not(:disabled){background:var(--accent)}
  .go:disabled{opacity:.4;cursor:not-allowed}
  .go:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

  .results{flex:1;overflow-y:auto;padding:18px 20px 22px}
  .meta{font-family:var(--mono);font-size:11px;letter-spacing:.05em;color:var(--muted);
    text-transform:uppercase;margin-bottom:14px}
  .intro{text-align:center;color:var(--muted);max-width:44ch;margin:12vh auto 0;padding:0 12px}
  .intro .big{font-family:var(--display);font-weight:600;font-size:22px;color:var(--ink);margin-bottom:8px;letter-spacing:-.01em}
  .intro p{font-size:14px}

  .jobs{display:flex;flex-direction:column;gap:10px}
  .jobcard{display:block;text-decoration:none;color:inherit;background:var(--surface);
    border:1px solid var(--line);border-radius:14px;padding:15px 17px;transition:.15s}
  a.jobcard:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 12px 26px -18px rgba(25,28,34,.45)}
  a.jobcard:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .jt{font-family:var(--display);font-weight:600;font-size:16.5px;letter-spacing:-.01em;color:var(--ink)}
  a.jobcard:hover .jt{color:var(--accent-deep)}
  .jm{font-size:13px;color:#464b53;margin-top:3px}
  .jc{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
  .chip2{font-family:var(--mono);font-size:10px;letter-spacing:.04em;background:var(--paper);
    border:1px solid var(--line);border-radius:6px;padding:3px 8px;color:var(--muted)}
  .chip2.date{color:var(--accent-deep);border-color:#cdd6f5;background:#eef1fc}
  .js{font-size:13px;color:#5a5f67;margin-top:10px;line-height:1.5}
  .jg{font-family:var(--mono);font-size:11px;color:var(--accent-deep);margin-top:11px;font-weight:700}

  .state{text-align:center;color:var(--muted);margin-top:8vh;font-size:14px}
  .spin{width:26px;height:26px;border:3px solid var(--line);border-top-color:var(--accent);
    border-radius:50%;margin:10vh auto 12px;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  @media (prefers-reduced-motion:reduce){.spin{animation:none}*{transition:none!important}}
</style>
</head>
<body>
<div class="app">
  <header class="bar">
    <div class="brand"><span class="dot" aria-hidden="true"></span>
      <h1>Job Match</h1><span class="live">LIVE · ADZUNA</span></div>
    <div class="controls">
      <input id="q" type="text" placeholder="Job title or keywords — e.g. casual retail, registered nurse" autocomplete="off">
      <input id="where" type="text" placeholder="Suburb or city (optional)" autocomplete="off">
      <select id="dist" aria-label="Distance">
        <option value="">Any distance</option>
        <option value="5">Within 5 km</option>
        <option value="10" selected>Within 10 km</option>
        <option value="25">Within 25 km</option>
        <option value="50">Within 50 km</option>
      </select>
      <button class="go" id="go">Search</button>
    </div>
  </header>

  <div class="results" id="results">
    <div class="intro" id="intro">
      <div class="big">Search live jobs.</div>
      <p>Type a role or keywords, add a location if you like, and get current listings — each links
        straight to the real posting, with the date it went up.</p>
    </div>
  </div>
</div>

<script>
const q=document.getElementById('q');
const whereEl=document.getElementById('where');
const dist=document.getElementById('dist');
const go=document.getElementById('go');
const results=document.getElementById('results');

function esc(s){return String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function escAttr(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function setLoading(){ results.innerHTML='<div class="spin" aria-label="Searching"></div><div class="state">Searching live listings…</div>'; }
function setState(msg){ results.innerHTML='<div class="state">'+esc(msg)+'</div>'; }

function renderJobs(data){
  const jobs=Array.isArray(data.jobs)?data.jobs:[];
  if(!jobs.length){ setState('No current listings matched. Try broader keywords, or widen the distance.'); return; }
  const total=data.count?(' of '+data.count.toLocaleString()):'';
  let html='<div class="meta">Showing '+jobs.length+total+' · newest first</div><div class="jobs">';
  jobs.forEach(j=>{
    const chips=[];
    if(j.posted) chips.push('<span class="chip2 date">'+esc(j.posted)+'</span>');
    if(j.salary) chips.push('<span class="chip2">'+esc(j.salary)+'</span>');
    if(j.contract) chips.push('<span class="chip2">'+esc(j.contract)+'</span>');
    const inner=
      '<div class="jt">'+esc(j.title)+'</div>'+
      '<div class="jm">'+esc([j.company,j.location].filter(Boolean).join(' · '))+'</div>'+
      (chips.length?'<div class="jc">'+chips.join('')+'</div>':'')+
      (j.summary?'<div class="js">'+esc(j.summary)+'</div>':'')+
      '<div class="jg">View job →</div>';
    html += j.url
      ? '<a class="jobcard" href="'+escAttr(j.url)+'" target="_blank" rel="noopener">'+inner+'</a>'
      : '<div class="jobcard">'+inner+'</div>';
  });
  html+='</div>';
  results.innerHTML=html;
  results.scrollTop=0;
}

async function search(){
  const what=q.value.trim();
  const where=whereEl.value.trim();
  if(!what && !where){ q.focus(); return; }
  go.disabled=true; setLoading();
  try{
    const res=await fetch('/.netlify/functions/chat',{
      method:'POST', headers:{'content-type':'application/json'},
      body:JSON.stringify({ what, where, distance: dist.value })
    });
    const data=await res.json();
    if(!res.ok || data.error){ setState('⚠️ '+(data.error||('Error '+res.status))); return; }
    renderJobs(data);
  }catch(e){
    setState('⚠️ Couldn’t reach the server. If the site was just updated, wait for the deploy to finish and try again.');
  }finally{ go.disabled=false; }
}

go.addEventListener('click', search);
[q, whereEl].forEach(el=>el.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); search(); } }));
dist.addEventListener('change', ()=>{ if(q.value.trim()||whereEl.value.trim()) search(); });
q.focus();
</script>
</body>
</html>
